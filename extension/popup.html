<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      width: 320px;
      padding: 16px;
      background: #030711;
      color: #e2e8f0;
      font-family: sans-serif;
      margin: 0;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
    }
    .logo {
      width: 24px;
      height: 24px;
      background: linear-gradient(to right, #6366f1, #8b5cf6);
      border-radius: 4px;
    }
    textarea {
      width: 100%;
      height: 100px;
      background: rgba(255,255,255,0.05);
      border: 1px border rgba(255,255,255,0.1);
      border-radius: 8px;
      color: white;
      padding: 10px;
      box-sizing: border-box;
      outline: none;
      resize: none;
    }
    button {
      width: 100%;
      padding: 12px;
      background: linear-gradient(to right, #6366f1, #8b5cf6);
      border: none;
      border-radius: 8px;
      color: white;
      font-weight: bold;
      margin-top: 12px;
      cursor: pointer;
    }
    #result {
      margin-top: 16px;
      font-size: 13px;
    }
    .bias-tag {
      display: inline-block;
      padding: 4px 8px;
      background: rgba(239, 68, 68, 0.1);
      color: #f87171;
      border-radius: 4px;
      font-size: 11px;
      font-weight: bold;
      margin-bottom: 8px;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo"></div>
    <span style="font-weight: bold">Copilot AI Auditor</span>
  </div>
  <textarea id="input" placeholder="Paste question here..."></textarea>
  <div style="display: flex; gap: 8px;">
    <button id="analyze" style="flex: 1;">Audit Question</button>
    <button id="mic" style="width: 44px; padding: 12px 0; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); margin-top: 12px;">
      🎤
    </button>
  </div>
  <div id="result"></div>
  <script src="popup.js"></script>
</body>
</html>
